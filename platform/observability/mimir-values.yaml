deploymentMode: monolithic

mimir:
  structuredConfig:
    common:
      storage:
        backend: filesystem
        filesystem:
          dir: /data/storage
    blocks_storage:
      backend: filesystem
      filesystem:
        dir: /data/blocks
    ruler_storage:
      backend: filesystem
      filesystem:
        dir: /data/ruler
    alertmanager_storage:
      backend: filesystem
      filesystem:
        dir: /data/alertmanager
    limits:
      ingestion_rate: 100000
      ingestion_burst_size: 200000

monolithic:
  replicas: 1
  persistentVolume:
    enabled: true
    size: 5Gi
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

# Disable all distributed components
alertmanager:
  enabled: false
compactor:
  replicas: 0
distributor:
  replicas: 0
ingester:
  replicas: 0
overrides_exporter:
  replicas: 0
querier:
  replicas: 0
query_frontend:
  replicas: 0
query_scheduler:
  replicas: 0
ruler:
  replicas: 0
store_gateway:
  replicas: 0

minio:
  enabled: false

nginx:
  enabled: false

gateway:
  enabled: false

metaMonitoring:
  serviceMonitor:
    enabled: false
  grafanaAgent:
    enabled: false

rollout_operator:
  enabled: false
