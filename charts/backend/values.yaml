image:
  repository: localhost:5001/kreator-backend
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  port: 8000

env:
  APP_ENV: local
  LOG_LEVEL: INFO
  OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo.observability.svc.cluster.local:4317
  CORS_ORIGINS: "http://frontend.localhost,http://localhost:3000"

# Secret containing DATABASE_URL (and any other backend secrets)
existingSecret: backend-secrets

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"

securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop: ["ALL"]
