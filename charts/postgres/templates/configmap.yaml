apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "postgres.fullname" . }}-config
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
data:
  postgresql.conf: |
    max_connections = {{ .Values.config.maxConnections }}
    shared_buffers = {{ .Values.config.sharedBuffers }}
    listen_addresses = '*'
