image:
  repository: postgres
  tag: "16-alpine"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  port: 5432

storage:
  size: 1Gi
  storageClassName: standard

resources:
  requests:
    memory: 256Mi
    cpu: 250m
  limits:
    memory: 512Mi
    cpu: 500m

# Name of the SealedSecret-derived Secret containing POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
existingSecret: postgres-credentials

config:
  maxConnections: 100
  sharedBuffers: 128MB

securityContext:
  runAsNonRoot: true
  runAsUser: 70
  runAsGroup: 70
  fsGroup: 70
